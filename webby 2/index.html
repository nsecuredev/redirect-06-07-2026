<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google reCAPTCHA v2 API (explicit onload rendering to dynamic theme support) -->
    <script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>
    
    <style>
        /* Light Theme (Default) */
        :root {
            --bg-gradient-start: #f1f5f9;
            --bg-gradient-end: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.08);
            --accent-primary: #3b82f6;
            --accent-primary-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.1);
            --text-main: #0f172a;
            --text-muted: #475569;
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.12);
            --input-focus: #3b82f6;
            --error-color: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.08);
            --success-color: #22c55e;
            --text-gradient-start: #0f172a;
            --text-gradient-end: #334155;
            --box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            --btn-disabled-bg: #cbd5e1;
            --btn-disabled-text: #94a3b8;
        }

        /* Dark Theme Override */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0f172a;
                --bg-gradient-end: #020617;
                --card-bg: rgba(30, 41, 59, 0.45);
                --card-border: rgba(255, 255, 255, 0.08);
                --accent-primary: #3b82f6;
                --accent-primary-hover: #2563eb;
                --accent-glow: rgba(59, 130, 246, 0.2);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --input-bg: rgba(15, 23, 42, 0.6);
                --input-border: rgba(255, 255, 255, 0.1);
                --input-focus: #60a5fa;
                --error-color: #f87171;
                --error-bg: rgba(248, 113, 113, 0.1);
                --success-color: #4ade80;
                --text-gradient-start: #ffffff;
                --text-gradient-end: #94a3b8;
                --box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                --btn-disabled-bg: #475569;
                --btn-disabled-text: #64748b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Ambient background glow elements */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            transition: background 0.3s ease;
        }
        
        .glow-1 { top: 10%; left: 15%; }
        .glow-2 { bottom: 10%; right: 15%; }

        /* Auth Card Container */
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 1;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--box-shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Step navigation wrappers */
        .step-wrapper {
            display: flex;
            width: 200%; /* Side by side panels */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-panel {
            width: 50%;
            transition: opacity 0.5s ease;
        }

        .step-panel.inactive {
            opacity: 0;
            pointer-events: none;
        }

        /* Headers */
        .auth-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--text-gradient-start), var(--text-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background 0.3s ease;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            background: var(--input-bg);
        }

        /* Capture verification layout */
        .captcha-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
            min-height: 78px;
        }

        /* Buttons */
        .btn-action {
            width: 100%;
            background: var(--accent-primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-action:hover:not(:disabled) {
            background: var(--accent-primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }

        .btn-action:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-action:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--btn-disabled-bg);
            color: var(--btn-disabled-text);
        }

        /* Inline error styling */
        .error-message {
            color: var(--error-color);
            background: var(--error-bg);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Spinner loading indicator */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Custom footer layout */
        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        /* Utility helper classes */
        .text-center { text-align: center; }
        
        /* Step specific views */
        #step-wrapper.show-step-2 {
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <!-- Decorative Glow Layers -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="step-wrapper" id="step-wrapper">
                
                <!-- STEP 1: Security Check (reCAPTCHA) -->
                <div class="step-panel" id="panel-step-1">
                    <div class="auth-header">
                        <h2>Security Verification</h2>
                        <p>Please complete the verification checks to continue.</p>
                    </div>

                    <div class="captcha-container">
                        <!-- Target container for explicit reCAPTCHA v2 loading -->
                        <div id="recaptcha-widget"></div>
                    </div>

                    <button type="button" id="continue-btn" class="btn-action" disabled onclick="navigateToStep2()">
                        <span>Continue</span>
                    </button>
                </div>

                <!-- STEP 2: Authenticate (Email & Password) -->
                <div class="step-panel inactive" id="panel-step-2">
                    <div class="auth-header">
                        <h2>Access Portal</h2>
                        <p>Sign in to establish your session.</p>
                    </div>

                    <div class="error-message" id="global-error">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <span id="error-text">Please resolve the input errors.</span>
                    </div>

                    <form id="auth-form" onsubmit="handleAuthSubmit(event)" novalidate>
                        <div class="form-group">
                            <label for="input-email">Email Address</label>
                            <div class="input-wrapper">
                                <input type="email" id="input-email" class="form-input" placeholder="name@company.com" required autocomplete="username">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="input-password">Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="input-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="btn-action">
                            <span class="spinner" id="submit-spinner"></span>
                            <span id="submit-btn-text">Sign In</span>
                        </button>
                    </form>
                    
                    <div class="auth-footer">
                        <p>Secure authentication session.</p>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

    <script>
        let captchaVerified = false;
        let recaptchaWidgetId = null;

        // Callback triggered by dynamic API script load
        function onRecaptchaLoad() {
            // Detect user system theme preference
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // Explicitly render reCAPTCHA matching the system color scheme
            recaptchaWidgetId = grecaptcha.render('recaptcha-widget', {
                'sitekey': '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI',
                'theme': isDark ? 'dark' : 'light',
                'callback': onCaptchaSuccess,
                'expired-callback': onCaptchaExpired
            });
        }

        // Callback invoked automatically when Google reCAPTCHA is verified
        function onCaptchaSuccess(token) {
            captchaVerified = true;
            document.getElementById('continue-btn').disabled = false;
        }

        // Callback invoked when the CAPTCHA session expires
        function onCaptchaExpired() {
            captchaVerified = false;
            document.getElementById('continue-btn').disabled = true;
        }

        // Transition from Step 1 to Step 2
        function navigateToStep2() {
            if (!captchaVerified) return;

            const wrapper = document.getElementById('step-wrapper');
            const panel1 = document.getElementById('panel-step-1');
            const panel2 = document.getElementById('panel-step-2');

            wrapper.classList.add('show-step-2');
            panel1.classList.add('inactive');
            panel2.classList.remove('inactive');
            
            setTimeout(() => {
                document.getElementById('input-email').focus();
            }, 600);
        }

        // Display error banner on form
        function showError(message) {
            const errorBanner = document.getElementById('global-error');
            const errorText = document.getElementById('error-text');
            
            errorText.textContent = message;
            errorBanner.style.display = 'flex';
        }

        // Hide error banner
        function hideError() {
            document.getElementById('global-error').style.display = 'none';
        }

        // Process Authentication Form Submission
        async function handleAuthSubmit(event) {
            event.preventDefault();
            hideError();

            const emailInput = document.getElementById('input-email');
            const passwordInput = document.getElementById('input-password');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('submit-spinner');
            const btnText = document.getElementById('submit-btn-text');

            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value;

            if (!emailValue) {
                showError("Email field is required.");
                emailInput.focus();
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailValue)) {
                showError("Please enter a valid email address.");
                emailInput.focus();
                return;
            }

            if (!passwordValue) {
                showError("Password field is required.");
                passwordInput.focus();
                return;
            }

            if (passwordValue.length < 6) {
                showError("Password must contain at least 6 characters.");
                passwordInput.focus();
                return;
            }

            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Verifying...';

            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                console.log('Authentication form validated successfully for user:', emailValue);
                
                emailInput.value = '';
                passwordInput.value = '';
                
                alert('Sign in successful (Demonstration Mode)');
                
            } catch (err) {
                showError("An unexpected system error occurred. Please try again.");
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Sign In';
            }
        }
    </script>
</body>
</html>
